name: Build and Publish NuGet Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      nuget_publish:
        description: 'Publish to NuGet.org'
        required: false
        default: 'true'

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_NAME: DScript

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Set package version from release tag
      if: github.event_name == 'release'
      run: |
        # Strip an optional leading "v" from the tag (e.g. v3.1.0 -> 3.1.0)
        VERSION="${GITHUB_REF_NAME#v}"
        echo "Patching <Version> to ${VERSION}"
        sed -i -E "s|<Version>[^<]*</Version>|<Version>${VERSION}</Version>|" \
          DScript/DScript.csproj \
          DScript.Extras/DScript.Extras.csproj
        echo "DScript:        $(grep -o '<Version>[^<]*</Version>' DScript/DScript.csproj)"
        echo "DScript.Extras: $(grep -o '<Version>[^<]*</Version>' DScript.Extras/DScript.Extras.csproj)"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build projects
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Pack DScript NuGet package
      run: dotnet pack DScript/DScript.csproj --configuration Release --no-build --output nupkg

    - name: Pack DScript.Extras NuGet package
      run: dotnet pack DScript.Extras/DScript.Extras.csproj --configuration Release --no-build --output nupkg

    - name: Upload NuGet packages as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: nupkg/

    - name: Publish to NuGet.org
      if: github.event_name == 'release' || github.event.inputs.nuget_publish == 'true'
      run: |
        dotnet nuget push nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
      continue-on-error: true

    - name: Create release assets with source code
      if: github.event_name == 'release'
      run: |
        # Build the source archives from the committed tree with `git archive`.
        # This reads from the git object store rather than walking the live
        # working directory, so it avoids "tar: file changed as we read it"
        # (caused by writing the archive into the directory being archived) and
        # naturally excludes untracked bin/, obj/ and .git contents.
        git archive --format=zip --output="dscript-source-${{ github.ref_name }}.zip" HEAD
        git archive --format=tar HEAD | gzip > "dscript-source-${{ github.ref_name }}.tar.gz"

    - name: Upload release assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          nupkg/*.nupkg
          dscript-source-${{ github.ref_name }}.zip
          dscript-source-${{ github.ref_name }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub release summary
      if: github.event_name == 'release'
      run: |
        echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Release:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ DScript NuGet Package" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ DScript.Extras NuGet Package" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Source Code (ZIP)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Source Code (TAR.GZ)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Published to" >> $GITHUB_STEP_SUMMARY
        echo "- 🔗 [NuGet.org](https://www.nuget.org/packages/DScript/)" >> $GITHUB_STEP_SUMMARY
        echo "- 📂 [GitHub Releases](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY

